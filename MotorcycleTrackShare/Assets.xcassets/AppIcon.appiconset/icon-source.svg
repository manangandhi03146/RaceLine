<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    RaceLine app icon.
    Concept: a stylized racing line sweeping through an apex, drawn over a deep
    dark background. The vertical stroke at the apex evokes a checkered flag /
    timing marker without literalising it. Reads cleanly at 60×60.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="85%">
      <stop offset="0%"  stop-color="#1F1F1F"/>
      <stop offset="55%" stop-color="#0E0E0E"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF8A1F"/>
      <stop offset="60%"  stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#D85800"/>
    </linearGradient>
  </defs>

  <!-- Solid square background (iOS rounds the corners itself) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Faint outer corner-track outline for depth -->
  <path d="M 70 870 Q 220 800 360 660 Q 560 470 720 320 Q 830 220 940 170"
        stroke="#FF6D00" stroke-opacity="0.10" stroke-width="120"
        stroke-linecap="round" fill="none"/>

  <!-- Primary racing line: enters bottom-left, hits apex centre, exits top-right -->
  <path d="M 90 870 Q 240 800 380 660 Q 560 480 720 320 Q 830 220 950 170"
        stroke="url(#line)" stroke-width="70"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Apex marker: vertical tick + dot -->
  <rect x="488" y="448" width="48" height="160" rx="12" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="512" cy="528" r="32" fill="#FF6D00"/>
</svg>
